version: 2

builds:
  - main: .
    binary: agent-buddy
    ldflags:
      - -s -w -X github.com/agenthubdev/agent-buddy/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
